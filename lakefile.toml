name = "RelationalAlgebra"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["RelationalAlgebra"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "LeanArchitect"
git = "https://github.com/hanwenzhu/LeanArchitect.git"
rev = "v4.28.0"

[[lean_lib]]
name = "RelationalAlgebra"